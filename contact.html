<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - IBN-E-Malik Studio</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">IBN-E-Malik Studio</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </header>

    <!-- TITLE -->
    <section class="page-title">
        <h1>Contact Us</h1>
    </section>

    <!-- CONTACT SECTION -->
    <section class="contact-page">

        <div class="contact-container">

            <!-- LEFT SIDE -->
            <div class="contact-info">
                <h2>Get In Touch</h2>

                <p><i class="fa-solid fa-phone"></i> +92 300 1234567</p>
                <p><i class="fa-solid fa-envelope"></i> info@khanstudio.com</p>
                <p><i class="fa-solid fa-location-dot"></i> Karachi, Pakistan</p>

                <a href="https://wa.me/923001234567" target="_blank" class="btn whatsapp-btn">
                    Chat on WhatsApp
                </a>
            </div>

            <!-- RIGHT SIDE -->
            <div class="contact-form">
                <form>
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea placeholder="Your Message" rows="5" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>

        </div>

    </section>

</body>
</html>
