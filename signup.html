<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoPro Studios - Login & Signup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           GLOBAL STYLES & RESET
        ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Gold Color Palette */
            --gold: #D4AF37;
            --dark-gold: #b8962e;
            --light-gold: #f5e6a8;
            
            /* Dark Theme */
            --dark-bg: #0a0a0a;
            --dark-card: #1a1a1a;
            --text-light: #ffffff;
            --text-gray: #a0a0a0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        body::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ============================================
           AUTH CONTAINER
        ============================================ */
        .auth-container {
            background: var(--dark-card);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(212, 175, 55, 0.2);
            margin: 0 auto;
        }

        /* ============================================
           HEADER/LOGO SECTION
        ============================================ */
        .auth-header {
            background: linear-gradient(135deg, var(--dark-gold) 0%, var(--gold) 100%);
            padding: 40px 30px;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .auth-header p {
            color: var(--light-gold);
            font-size: 0.95rem;
        }

        /* ============================================
           FORM SECTION
        ============================================ */
        .auth-form {
            padding: 40px 30px;
        }

        .form-title {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--gold);
            text-align: center;
        }

        .form-subtitle {
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-gray);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            background: rgba(212, 175, 55, 0.05);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            color: var(--text-light);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .form-group input::placeholder {
            color: var(--text-gray);
        }

        /* Input Icons */
        .input-icon {
            position: absolute;
            right: 15px;
            top: 43px;
            color: var(--gold);
            font-size: 1.2rem;
            pointer-events: none;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 43px;
            color: var(--gold);
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--light-gold);
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--gold);
        }

        .checkbox-group label {
            color: var(--text-gray);
            font-size: 0.9rem;
            cursor: pointer;
            margin: 0;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--dark-gold) 0%, var(--gold) 100%);
            border: none;
            border-radius: 12px;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* ============================================
           DIVIDER
        ============================================ */
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(212, 175, 55, 0.2);
        }

        .divider::before {
            margin-right: 15px;
        }

        .divider::after {
            margin-left: 15px;
        }

        /* ============================================
           SOCIAL LOGIN BUTTONS
        ============================================ */
        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: rgba(212, 175, 55, 0.05);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        /* ============================================
           FOOTER LINKS
        ============================================ */
        .auth-footer {
            text-align: center;
            padding: 20px 30px 30px;
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: var(--light-gold);
            text-decoration: underline;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: var(--gold);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: var(--light-gold);
        }

        /* ============================================
           TAB SWITCHER (Login/Signup Toggle)
        ============================================ */
        .tab-switcher {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(212, 175, 55, 0.05);
            padding: 5px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-radius: 10px;
            color: var(--text-gray);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--dark-gold) 0%, var(--gold) 100%);
            color: var(--text-light);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        /* ============================================
           FORM CONTAINERS (Hidden by default)
        ============================================ */
        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================
           SUCCESS MESSAGE
        ============================================ */
        .success-message {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            color: var(--light-gold);
            text-align: center;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================
           BACK TO WEBSITE LINK
        ============================================ */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            z-index: 10;
            background: rgba(26, 26, 26, 0.8);
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
        }

        .back-link:hover {
            color: var(--light-gold);
            transform: translateX(-5px);
        }

        /* ============================================
           MOBILE RESPONSIVENESS
        ============================================ */
        @media (max-width: 480px) {
            .auth-container {
                margin: 0;
            }

            .auth-header {
                padding: 30px 20px;
            }

            .auth-form {
                padding: 30px 20px;
            }

            .logo {
                font-size: 1.6rem;
            }

            .form-title {
                font-size: 1.5rem;
            }

            .social-login {
                flex-direction: column;
            }

            .back-link {
                top: 10px;
                left: 10px;
                font-size: 0.9rem;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Back to Website Link -->
    <a href="index.html" class="back-link">
        <span>←</span> Back to Website
    </a>

    <!-- Auth Container -->
    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <div class="logo">Prod.by Adeel Malik</div>
            <p>Capturing moments in stunning detail</p>
        </div>

        <!-- Tab Switcher -->
        <div style="padding: 30px 30px 0;">
            <div class="tab-switcher">
                <button class="tab-btn active" onclick="showLogin()">Login</button>
                <button class="tab-btn" onclick="showSignup()">Sign Up</button>
            </div>
        </div>

        <!-- Success Message -->
        <div style="padding: 0 30px;">
            <div class="success-message" id="successMessage"></div>
        </div>

        <!-- ============================================
             LOGIN FORM
        ============================================ -->
        <div class="form-container active" id="loginForm">
            <form class="auth-form" onsubmit="handleLogin(event)">
                <h2 class="form-title">Welcome Back</h2>
                <p class="form-subtitle">Login to access your account</p>

                <!-- Email Input -->
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        placeholder="Enter your email"
                        required
                    >
                    <span class="input-icon">📧</span>
                </div>

                <!-- Password Input -->
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="Enter your password"
                        required
                    >
                    <span class="password-toggle" onclick="togglePassword('loginPassword')">👁️</span>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <div class="checkbox-group" style="margin: 0;">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <div class="forgot-password" style="margin: 0;">
                        <a href="#">Forgot Password?</a>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">Login</button>

                <!-- Divider -->
                <div class="divider">Or continue with</div>

                <!-- Social Login -->
                <div class="social-login">
                    <button type="button" class="social-btn" onclick="socialLogin('google')">G</button>
                    <button type="button" class="social-btn" onclick="socialLogin('facebook')">f</button>
                    <button type="button" class="social-btn" onclick="socialLogin('apple')">🍎</button>
                </div>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                Don't have an account? <a href="#" onclick="showSignup(); return false;">Sign up now</a>
            </div>
        </div>

        <!-- ============================================
             SIGNUP FORM
        ============================================ -->
        <div class="form-container" id="signupForm">
            <form class="auth-form" onsubmit="handleSignup(event)">
                <h2 class="form-title">Create Account</h2>
                <p class="form-subtitle">Sign up to get started</p>

                <!-- Full Name Input -->
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input 
                        type="text" 
                        id="signupName" 
                        placeholder="Enter your full name"
                        required
                    >
                    <span class="input-icon">👤</span>
                </div>

                <!-- Email Input -->
                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input 
                        type="email" 
                        id="signupEmail" 
                        placeholder="Enter your email"
                        required
                    >
                    <span class="input-icon">📧</span>
                </div>

                <!-- Password Input -->
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input 
                        type="password" 
                        id="signupPassword" 
                        placeholder="Create a password"
                        required
                        minlength="6"
                    >
                    <span class="password-toggle" onclick="togglePassword('signupPassword')">👁️</span>
                </div>

                <!-- Confirm Password Input -->
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        placeholder="Confirm your password"
                        required
                        minlength="6"
                    >
                    <span class="password-toggle" onclick="togglePassword('confirmPassword')">👁️</span>
                </div>

                <!-- Terms & Conditions -->
                <div class="checkbox-group">
                    <input type="checkbox" id="termsAgree" required>
                    <label for="termsAgree">I agree to the <a href="#" style="color: var(--gold);">Terms & Conditions</a></label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">Create Account</button>

                <!-- Divider -->
                <div class="divider">Or sign up with</div>

                <!-- Social Signup -->
                <div class="social-login">
                    <button type="button" class="social-btn" onclick="socialLogin('google')">G</button>
                    <button type="button" class="social-btn" onclick="socialLogin('facebook')">f</button>
                    <button type="button" class="social-btn" onclick="socialLogin('apple')">🍎</button>
                </div>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                Already have an account? <a href="#" onclick="showLogin(); return false;">Login here</a>
            </div>
        </div>
    </div>

    <!-- ============================================
         JAVASCRIPT
    ============================================ -->
    <script>
        /* ============================================
           TOGGLE BETWEEN LOGIN AND SIGNUP
        ============================================ */
        function showLogin() {
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('signupForm').classList.remove('active');
            
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.remove('active');
            
            hideSuccessMessage();
        }

        function showSignup() {
            document.getElementById('signupForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
            
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.querySelectorAll('.tab-btn')[0].classList.remove('active');
            
            hideSuccessMessage();
        }

        /* ============================================
           PASSWORD TOGGLE VISIBILITY
        ============================================ */
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        /* ============================================
           HANDLE LOGIN FORM SUBMISSION
        ============================================ */
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;
            
            // Simulate login process
            console.log('Login attempt:', { email, password, remember });
            
            // Show success message
            showSuccessMessage('Login successful! Redirecting...');
            
            // Reset form
            event.target.reset();
            
            // Simulate redirect after 2 seconds
            setTimeout(() => {
                alert('Welcome back! You would be redirected to the dashboard.');
            }, 2000);
        }

        /* ============================================
           HANDLE SIGNUP FORM SUBMISSION
        ============================================ */
        function handleSignup(event) {
            event.preventDefault();
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate passwords match
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            // Simulate signup process
            console.log('Signup attempt:', { name, email, password });
            
            // Show success message
            showSuccessMessage('Account created successfully! Please login.');
            
            // Reset form
            event.target.reset();
            
            // Switch to login form after 2 seconds
            setTimeout(() => {
                showLogin();
            }, 2000);
        }

        /* ============================================
           SOCIAL LOGIN HANDLER
        ============================================ */
        function socialLogin(provider) {
            console.log(`Social login with ${provider}`);
            showSuccessMessage(`Connecting with ${provider}...`);
            
            setTimeout(() => {
                alert(`${provider} login would be implemented here.`);
                hideSuccessMessage();
            }, 1500);
        }

        /* ============================================
           SUCCESS MESSAGE HELPERS
        ============================================ */
        function showSuccessMessage(message) {
            const messageEl = document.getElementById('successMessage');
            messageEl.textContent = message;
            messageEl.classList.add('show');
        }

        function hideSuccessMessage() {
            const messageEl = document.getElementById('successMessage');
            messageEl.classList.remove('show');
        }

        /* ============================================
           FORM VALIDATION FEEDBACK
        ============================================ */
        document.querySelectorAll('input[required]').forEach(input => {
            input.addEventListener('invalid', function(e) {
                e.preventDefault();
                this.style.borderColor = '#ff4444';
            });
            
            input.addEventListener('input', function() {
                this.style.borderColor = 'rgba(212, 175, 55, 0.2)';
            });
        });
    </script>
</body>
</html>
